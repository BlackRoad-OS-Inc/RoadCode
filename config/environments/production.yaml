environment: production
fleet:
  gateway: alice.internal
  inference: cecilia.internal
  platform: octavia.internal
  edge: aria.internal
  dns: lucidia.internal

services:
  gateway:
    port: 8000
    workers: 4
  search:
    port: 8001
    index_path: /data/indexes
  inference:
    port: 11434
    default_model: llama3.2:3b

monitoring:
  interval: 60
  alerts: true
  retention_days: 30

security:
  tls: true
  auth_required: true
  rate_limit: 100
