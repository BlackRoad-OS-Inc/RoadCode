# BlackRoad Edge Router — nginx config for Alice
# Routes all 20 domains to the right backend across the fleet
#
# Deploy: scp to pi@192.168.4.49:/etc/nginx/sites-enabled/blackroad-edge
# Reload: ssh pi@192.168.4.49 'sudo nginx -t && sudo systemctl reload nginx'

# ── Upstreams (fleet backends) ──
upstream ollama_cecilia {
    server 192.168.4.96:11434;
}

upstream qdrant_alice {
    server 127.0.0.1:6333;
}

upstream nats_octavia {
    server 192.168.4.101:8222;
}

upstream gitea_octavia {
    server 192.168.4.101:3100;
}

upstream minio_cecilia {
    server 192.168.4.96:9000;
}

upstream ai_gateway {
    server 192.168.4.96:7000;
}

upstream rag_api {
    server 127.0.0.1:8900;
}

# ── blackroad.io (main site) ──
server {
    listen 80;
    server_name blackroad.io www.blackroad.io;

    root /var/www/blackroad-io;
    index index.html;

    # Static files with caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|svg|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # AI chat API → Cecilia Ollama
    location /api/chat {
        proxy_pass http://ai_gateway;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # RAG search API
    location /api/search {
        proxy_pass http://rag_api/search;
        proxy_set_header Host $host;
    }

    # Embed API
    location /api/embed {
        proxy_pass http://rag_api/embed;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── images.blackroad.io → MinIO on Cecilia ──
server {
    listen 80;
    server_name images.blackroad.io;

    location / {
        proxy_pass http://minio_cecilia/blackroad-images/;
        proxy_set_header Host $host;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

# ── git.blackroad.io → Gitea on Octavia ──
server {
    listen 80;
    server_name git.blackroad.io;

    location / {
        proxy_pass http://gitea_octavia;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 50m;
    }
}

# ── api.blackroad.io → AI Gateway ──
server {
    listen 80;
    server_name api.blackroad.io;

    location / {
        proxy_pass http://ai_gateway;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        add_header Access-Control-Allow-Origin *;
    }
}

# ── nats.blackroad.io → NATS monitoring ──
server {
    listen 80;
    server_name nats.blackroad.io;

    location / {
        proxy_pass http://nats_octavia;
        proxy_set_header Host $host;
    }
}

# ── search.blackroad.io → RAG API ──
server {
    listen 80;
    server_name search.blackroad.io;

    location / {
        proxy_pass http://rag_api;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }
}

# ── Catch-all for other subdomains → static sites ──
server {
    listen 80 default_server;
    server_name *.blackroad.io;

    root /var/www/default;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
