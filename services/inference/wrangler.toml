name               = "blackroad-ai-gateway"
main               = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id         = "848cf0b18d51e0170e0d1537aec3505a"

[vars]
INSTANCE = "blackroad-ai-gateway"
DEFAULT_PROVIDER = "groq"

# KV for rate limiting, API keys, usage tracking
[[kv_namespaces]]
binding = "AI_STATE"
id      = "28ed114677e54e23ad10cc7901f1fd98"

# D1 for request logging and analytics
[[d1_databases]]
binding       = "DB"
database_name = "blackboard"
database_id   = "bcc78f33-b052-4cb2-bcfb-db5cd3c08472"

# Secrets (set via `wrangler secret put`):
#   ADMIN_API_KEY       — admin access for key management + metrics
#   GROQ_API_KEY        — Groq LPU inference
#   TOGETHER_API_KEY    — Together AI
#   DEEPSEEK_API_KEY    — DeepSeek
#   XAI_API_KEY         — xAI/Grok
#   OPENAI_API_KEY      — OpenAI
#   ANTHROPIC_API_KEY   — Anthropic/Claude
#   GEMINI_API_KEY      — Google Gemini

# Routes: api.blackroad.io/v1/*
# Custom domain configured via Cloudflare dashboard
