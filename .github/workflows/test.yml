name: "🧪 Test Packages"

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "package.json"
      - "tsconfig.json"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "package.json"
      - "tsconfig.json"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npx tsc -b packages/greenlight packages/greenlight-cli

      - name: Run tests
        run: npm test -w @roadcode/greenlight
