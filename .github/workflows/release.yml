name: "📦 Release Packages"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: "@roadcode"

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx tsc -b packages/greenlight packages/greenlight-cli packages/roadchain

      - name: Run all tests
        run: |
          npm test -w @roadcode/greenlight
          npm test -w @roadcode/greenlight-cli
          npm test -w @roadcode/roadchain

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Publish @roadcode/greenlight
        working-directory: packages/greenlight
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @roadcode/roadchain
        working-directory: packages/roadchain
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish @roadcode/greenlight-cli
        working-directory: packages/greenlight-cli
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
